<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THWIN 8 - Social App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-md mx-auto">
        <div class="bg-blue-600 p-6 rounded-t-2xl shadow-lg">
            <h1 class="text-3xl font-bold text-white text-center">THWIN 8</h1>
        </div>

        <div class="bg-white p-6 rounded-b-2xl shadow-md mb-6">
            <input id="userNameInput" type="text" class="w-full p-2 mb-3 border-b focus:outline-none focus:border-blue-500 font-semibold" placeholder="သင့်နာမည် (Username) ရိုက်ပါ...">
            <textarea id="postInput" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 h-24" placeholder="ယနေ့ ဘာတွေတွေးနေလဲ..."></textarea>
            <button onclick="savePost()" class="mt-4 w-full bg-blue-500 text-white py-3 rounded-xl hover:bg-blue-600 font-bold shadow-lg">Post တင်မည် ✨</button>
        </div>

        <div id="postsDisplay" class="space-y-4 pb-10"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcLrSDYuu4mOIP1VdQd3HGmYqjQc1Uw",
            authDomain: "thwin-social-app.firebaseapp.com",
            projectId: "thwin-social-app",
            storageBucket: "thwin-social-app.firebasestorage.app",
            messagingSenderId: "422543246009",
            appId: "1:422543246009:web:c4ef5bc4c1e81dfdbb1168"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.savePost = async () => {
            const userName = document.getElementById('userNameInput').value;
            const postText = document.getElementById('postInput').value;
            if (userName.trim() === "" || postText.trim() === "") return alert("အချက်အလက်ပြည့်စုံစွာဖြည့်ပါ");

            try {
                await addDoc(collection(db, "posts"), {
                    user: userName,
                    text: postText,
                    timestamp: serverTimestamp()
                });
                document.getElementById('postInput').value = "";
            } catch (e) { alert("Firebase Rules ကို စစ်ဆေးပါ"); }
        };

        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const postsDisplay = document.getElementById('postsDisplay');
            postsDisplay.innerHTML = "";
            snapshot.forEach((doc) => {
                const post = doc.data();
                const time = post.timestamp ? new Date(post.timestamp.seconds * 1000).toLocaleString() : "ခုနလေးတင်";
                postsDisplay.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                        <span class="font-bold text-gray-800">@${post.user}</span>
                        <p class="text-gray-700 mt-2">${post.text}</p>
                        <div class="text-[10px] text-gray-400 text-right mt-2">${time}</div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
