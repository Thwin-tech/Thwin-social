<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THWIN 8 - Ultimate Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-md mx-auto">
        <div class="bg-blue-600 p-6 rounded-t-2xl shadow-lg text-center">
            <h1 class="text-3xl font-bold text-white">THWIN 8</h1>
            <p class="text-blue-100 text-xs">Full Featured Social App</p>
        </div>

        <div class="bg-white p-5 rounded-b-2xl shadow-md mb-6">
            <input id="userNameInput" type="text" class="w-full p-2 mb-3 border-b focus:outline-none focus:border-blue-500 font-semibold" placeholder="သင့်နာမည်...">
            <textarea id="postInput" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 h-24 mb-3" placeholder="ဘာတွေတွေးနေလဲ..."></textarea>
            
            <input type="file" id="imageInput" class="text-sm text-gray-500 mb-3 block w-full file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            
            <button onclick="savePost()" class="w-full bg-blue-500 text-white py-3 rounded-xl hover:bg-blue-600 font-bold shadow-lg transition">Post တင်မည် ✨</button>
        </div>

        <div id="postsDisplay" class="space-y-4 pb-10"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, deleteDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcLrSDYuu4mOIP1VdQd3HGmYqjQc1Uw",
            authDomain: "thwin-social-app.firebaseapp.com",
            projectId: "thwin-social-app",
            storageBucket: "thwin-social-app.firebasestorage.app",
            messagingSenderId: "422543246009",
            appId: "1:422543246009:web:c4ef5bc4c1e81dfdbb1168"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Save Post
        window.savePost = async () => {
            const user = document.getElementById('userNameInput').value;
            const text = document.getElementById('postInput').value;
            if(!user || !text) return alert("နာမည်နှင့် စာသားဖြည့်ပါ");

            await addDoc(collection(db, "posts"), {
                user, text, likes: 0, 
                timestamp: serverTimestamp()
            });
            document.getElementById('postInput').value = "";
        };

        // Delete Post
        window.deletePost = async (id) => {
            if(confirm("ဖျက်မှာ သေချာပြီလား?")) {
                await deleteDoc(doc(db, "posts", id));
            }
        };

        // Like Post
        window.likePost = async (id) => {
            await updateDoc(doc(db, "posts", id), { likes: increment(1) });
        };

        // Share Post
        window.sharePost = (text) => {
            if (navigator.share) {
                navigator.share({ title: 'THWIN 8', text: text, url: window.location.href });
            } else {
                alert("Link ကို Copy ကူးလိုက်ပါပြီ");
            }
        };

        // Load Posts
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const display = document.getElementById('postsDisplay');
            display.innerHTML = "";
            snapshot.forEach((pDoc) => {
                const p = pDoc.data();
                display.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                        <div class="flex justify-between items-start mb-2">
                            <span class="font-bold text-blue-600 italic">@${p.user}</span>
                            <button onclick="deletePost('${pDoc.id}')" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash-can text-xs"></i></button>
                        </div>
                        <p class="text-gray-700 mb-4">${p.text}</p>
                        <div class="flex justify-between items-center pt-3 border-t">
                            <button onclick="likePost('${pDoc.id}')" class="text-gray-500 flex items-center gap-1 text-sm hover:text-pink-500 transition">
                                <i class="fas fa-heart"></i> <span>${p.likes || 0}</span>
                            </button>
                            <button onclick="sharePost('${p.text}')" class="text-gray-500 text-sm hover:text-blue-500">
                                <i class="fas fa-share-nodes"></i> Share
                            </button>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
